no-permission: "<red>您沒有權限使用此指令。"

# Private messages
msg-usage: "<red>用法: /msg <player> <message>"
msg-player-offline: "<red>玩家 <player> 不線上。"
msg-self: "<red>您不能給自己發送訊息。"
msg-cooldown: "<red>請等待 <seconds> 秒後再發送下一條訊息。"
msg-ignored: "<red>該玩家正在忽略您。"
reply-usage: "<red>用法: /reply <message>"
reply-no-target: "<red>您沒有回覆對象。"

# Toggle chat
togglechat-usage: "<red>用法: /togglechat [global|local|all]"
togglechat-global-on: "<green>全局聊天已啟用。"
togglechat-global-off: "<red>全局聊天已停用。"
togglechat-local-on: "<green>本地聊天已啟用。"
togglechat-local-off: "<red>本地聊天已停用。"
togglechat-all-on: "<green>所有聊天頻道已啟用。"
togglechat-all-off: "<red>所有聊天頻道已停用。"

# Mentions
mention-notify: "<yellow>您被 <player> 提到！"
mention-format-others: "<yellow>@<player><reset>"
mention-format-self: "<green>@<player><reset>"

# Ignore
ignore-usage: "<red>用法: /ignore <player>"
ignore-self: "<red>您不能忽略自己。"
ignore-already: "<red>您已經在忽略 <player>。"
ignore-added: "<green>您現在正在忽略 <player>。"
unignore-usage: "<red>用法: /unignore <player>"
unignore-not-found: "<red>您沒有忽略 <player>。"
unignore-removed: "<green>您不再忽略 <player>。"
ignorelist-empty: "<gray>您沒有忽略任何人。"
ignorelist-header: "<gold>忽略的玩家:"
ignorelist-entry: "<gray>- <player>"

# Errors
player-not-found: "<red>未找到玩家 <player>。"
invalid-usage: "<red>無效用法。"

# Help and reload
chat-help: |
  <gold>NekoChat v${version} by Hanamura Miyu
  <white>指令:
  <gray>/chat help</gray> - 顯示此幫助
  <gray>/chat reload</gray> - 重新載入設定（僅限管理員）
  <gray>/msg <player> <message></gray> - 發送私聊訊息
  <gray>/reply <message></gray> - 回覆最後一條訊息
  <gray>/togglechat [global|local|all]</gray> - 啟用/停用頻道（僅限管理員）
  <gray>/ignore <player></gray> - 忽略玩家
  <gray>/unignore <player></gray> - 取消忽略玩家
  <gray>/ignorelist</gray> - 忽略玩家清單
  <gray>全局聊天: 使用 ! 前綴</gray>
  <gray>提到: @player</gray>
reload-success: "<green>設定重新載入成功。"